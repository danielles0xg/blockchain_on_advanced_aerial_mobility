[toolchain]
anchor_version = "0.30.1"

[features]
seeds = false
skip-lint = false

[programs.localnet]
aam_security_log = "4KAuuJxmX2x2JD6d3F7jxyUqHNufxkYsaA38Rjbb9Ccr"

[programs.devnet]
aam_security_log = "4KAuuJxmX2x2JD6d3F7jxyUqHNufxkYsaA38Rjbb9Ccr"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
startup_wait = 5000
shutdown_wait = 2000

[test.validator]
url = "http://127.0.0.1:8899"
